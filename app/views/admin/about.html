<div class="admin-page">
  <div class="admin-topbar">
    <h1 class="admin-topbar__title">Quản lý Về chúng tôi</h1>
  </div>

  <form action="/admin/about" method="POST" onsubmit="ajaxForm(this,{btn:this.querySelector('[type=submit]')});return false;">

    <div class="about-grid">

      <!-- CỘT TRÁI -->
      <div style="display:flex;flex-direction:column;gap:1.25rem;">

        <!-- Giới thiệu chính -->
        <div class="admin-card">
          <div class="admin-card__header">
            <div class="admin-card__title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.4rem;color:#1a7f5a;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Đoạn giới thiệu chính
            </div>
          </div>
          <div style="padding:1.25rem;">
            <textarea class="form-input form-textarea" name="about_text" rows="7" placeholder="Mô tả về công ty...">{{#if about.about_text}}{{about.about_text.content}}{{/if}}</textarea>
          </div>
        </div>

        <!-- Sứ mệnh & Tầm nhìn -->
        <div class="admin-card">
          <div class="admin-card__header">
            <div class="admin-card__title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.4rem;color:#1a7f5a;"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              Sứ mệnh & Tầm nhìn
            </div>
          </div>
          <div style="padding:1.25rem;display:flex;flex-direction:column;gap:1rem;">
            <div class="form-row">
              <div class="form-group" style="margin:0;">
                <label class="form-label">Tiêu đề sứ mệnh</label>
                <input class="form-input" type="text" name="mission_title" value="{{#if about.mission}}{{about.mission.title}}{{/if}}" placeholder="Sứ mệnh" />
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Tiêu đề tầm nhìn</label>
                <input class="form-input" type="text" name="vision_title" value="{{#if about.vision}}{{about.vision.title}}{{/if}}" placeholder="Tầm nhìn" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group" style="margin:0;">
                <label class="form-label">Nội dung sứ mệnh</label>
                <textarea class="form-input form-textarea" name="mission" rows="5">{{#if about.mission}}{{about.mission.content}}{{/if}}</textarea>
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Nội dung tầm nhìn</label>
                <textarea class="form-input form-textarea" name="vision" rows="5">{{#if about.vision}}{{about.vision.content}}{{/if}}</textarea>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- CỘT PHẢI -->
      <div style="display:flex;flex-direction:column;gap:1.25rem;">

        <!-- Số liệu thống kê -->
        <div class="admin-card">
          <div class="admin-card__header">
            <div class="admin-card__title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:.4rem;color:#1a7f5a;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              Số liệu thống kê
            </div>
          </div>
          <div style="padding:1.25rem;display:flex;flex-direction:column;gap:.875rem;">

            <div class="about-stat-row">
              <div class="about-stat-icon" style="background:#e8f5f0;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a7f5a" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:.4rem;">
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Số trường đối tác (con số)</label>
                  <input class="form-input" type="text" name="stats_schools_title"
                    value="{{#if about.stats_schools}}{{about.stats_schools.title}}{{/if}}"
                    placeholder="120+" />
                </div>
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Nhãn mô tả</label>
                  <input class="form-input" type="text" name="stats_schools"
                    value="{{#if about.stats_schools}}{{about.stats_schools.content}}{{/if}}"
                    placeholder="Trường đối tác" />
                </div>
              </div>
            </div>

            <div class="about-stat-row">
              <div class="about-stat-icon" style="background:#fff3e0;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:.4rem;">
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Số học sinh (con số)</label>
                  <input class="form-input" type="text" name="stats_students_title"
                    value="{{#if about.stats_students}}{{about.stats_students.title}}{{/if}}"
                    placeholder="50,000+" />
                </div>
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Nhãn mô tả</label>
                  <input class="form-input" type="text" name="stats_students"
                    value="{{#if about.stats_students}}{{about.stats_students.content}}{{/if}}"
                    placeholder="Học sinh" />
                </div>
              </div>
            </div>

            <div class="about-stat-row">
              <div class="about-stat-icon" style="background:#f3e8ff;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:.4rem;">
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Số khối lớp (con số)</label>
                  <input class="form-input" type="text" name="stats_grades_title"
                    value="{{#if about.stats_grades}}{{about.stats_grades.title}}{{/if}}"
                    placeholder="5" />
                </div>
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Nhãn mô tả</label>
                  <input class="form-input" type="text" name="stats_grades"
                    value="{{#if about.stats_grades}}{{about.stats_grades.content}}{{/if}}"
                    placeholder="Khối lớp" />
                </div>
              </div>
            </div>

            <div class="about-stat-row">
              <div class="about-stat-icon" style="background:#e8f0fe;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:.4rem;">
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Năm kinh nghiệm (con số)</label>
                  <input class="form-input" type="text" name="stats_years_title"
                    value="{{#if about.stats_years}}{{about.stats_years.title}}{{/if}}"
                    placeholder="10+" />
                </div>
                <div>
                  <label class="form-label" style="margin-bottom:.2rem;">Nhãn mô tả</label>
                  <input class="form-input" type="text" name="stats_years"
                    value="{{#if about.stats_years}}{{about.stats_years.content}}{{/if}}"
                    placeholder="Năm kinh nghiệm" />
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- Tip box -->
        <div style="background:#e8f5f0;border-radius:10px;padding:1rem 1.125rem;display:flex;gap:.6rem;align-items:flex-start;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a7f5a" stroke-width="2" style="flex-shrink:0;margin-top:.1rem;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div style="font-size:.825rem;color:#1a7f5a;line-height:1.6;">
            Nội dung này hiển thị trên trang <strong>Về chúng tôi</strong> của website. Số liệu thống kê sẽ hiển thị nổi bật ở phần giữa trang.
          </div>
        </div>

      </div>
    </div>

    <!-- SAVE BAR -->
    <div style="display:flex;justify-content:flex-end;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid #e8e8e4;">
      <button type="submit" class="btn btn--primary btn--lg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:.4rem;vertical-align:middle;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Lưu thay đổi
      </button>
    </div>

  </form>
</div>

<style>
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  align-items: start;
}
.about-stat-row {
  display: flex;
  align-items: center;
  gap: .875rem;
  padding: .75rem;
  background: #fafaf8;
  border: 1px solid #e8e8e4;
  border-radius: 8px;
}
.about-stat-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
@media (max-width: 900px) {
  .about-grid { grid-template-columns: 1fr; }
}
</style>
