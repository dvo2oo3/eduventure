<div class="page-header">
  <div>
    <h1 class="page-title">Quản lý Uploads</h1>
    <p class="page-desc">Tải lên, xem và xóa ảnh & video trên Cloudflare R2</p>
  </div>
</div>

<!-- UPLOAD ZONE -->
<div class="upload-zone-wrap" id="uploadZoneWrap">
  <div class="upload-zone" id="uploadZone">
    <div class="upload-zone__icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-zone__text">Kéo thả ảnh & video vào đây</div>
    <div class="upload-zone__sub">JPG, PNG, WEBP, GIF, MP4, WEBM, MOV — tối đa 200MB mỗi file</div>
    <label class="upload-zone__btn">
      Chọn file từ máy
      <input type="file" id="uploadFileInput" multiple accept="image/*,video/mp4,video/webm,video/ogg,video/mov" style="display:none;" onchange="handleFileSelect(this.files)" />
    </label>
  </div>

  <!-- QUEUE -->
  <div id="uploadQueue" style="display:none;margin-top:1rem;display:flex;flex-direction:column;gap:.6rem;"></div>
</div>

<!-- STATS -->
<div class="uploads-stats" id="statsBar">
  <div class="ustat-card">
    <div class="ustat-icon ustat-icon--blue">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    </div>
    <div>
      <div class="ustat-num" id="totalFiles">—</div>
      <div class="ustat-label">Tổng file</div>
    </div>
  </div>
  <div class="ustat-card">
    <div class="ustat-icon ustat-icon--green">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div>
      <div class="ustat-num" id="totalSize">—</div>
      <div class="ustat-label">Dung lượng</div>
    </div>
  </div>
  <div class="ustat-card">
    <div class="ustat-icon ustat-icon--orange">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
    </div>
    <div>
      <div class="ustat-num" id="selectedCount">0</div>
      <div class="ustat-label">Đã chọn</div>
    </div>
  </div>
  <div class="ustat-card">
    <div class="ustat-icon ustat-icon--teal">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
    </div>
    <div>
      <div class="ustat-num" id="usedCount">—</div>
      <div class="ustat-label">Đang được dùng</div>
    </div>
  </div>
  <div class="ustat-card">
    <div class="ustat-icon ustat-icon--red">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div>
      <div class="ustat-num" id="unusedCount">—</div>
      <div class="ustat-label">Không dùng</div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="uploads-toolbar">
  <div class="uploads-filters">
    <button class="uf-tab active" data-folder="all">Tất cả</button>
    <button class="uf-tab" data-folder="news">Tin tức</button>
    <button class="uf-tab" data-folder="media">Banner/Logo</button>
    <button class="uf-tab" data-folder="content">Nội dung</button>
    <button class="uf-tab" data-folder="software">💾 Phần mềm</button>
    <button class="uf-tab" data-type="video">🎬 Video</button>
    <button class="uf-tab" data-type="image">🖼 Ảnh</button>
    <button class="uf-tab" data-usage="used">✅ Đang dùng</button>
    <button class="uf-tab" data-usage="unused">🗑 Không dùng</button>
  </div>
  <div class="uploads-actions">
    <button class="btn-uaction btn-uaction--danger" id="btnBulkDelete" disabled onclick="bulkDelete()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
      Xóa đã chọn (<span id="bulkCount">0</span>)
    </button>
    <button class="btn-uaction" id="btnSelectAll" onclick="toggleSelectAll()">Chọn tất cả</button>
  </div>
</div>

<!-- GRID -->
<div class="uploads-grid" id="uploadsGrid">
  <div class="uploads-loading">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    <p>Đang tải...</p>
  </div>
</div>

<!-- MODAL XEM ẢNH -->
<div class="umodal-overlay" id="imgModal" onclick="closeModal(event)">
  <div class="umodal">
    <button class="umodal-close" onclick="document.getElementById('imgModal').classList.remove('open'); const v=document.getElementById('modalVideo'); v.pause(); v.src='';">✕</button>
    <div id="modalMedia" style="background:#111;">
      <img id="modalImg" src="" alt="" style="display:none;" />
      <video id="modalVideo" src="" controls style="width:100%;max-height:400px;display:none;"></video>
    </div>
    <div class="umodal-info">
      <div id="modalName" class="umodal-name"></div>
      <div id="modalMeta" class="umodal-meta"></div>
      <button class="btn-udelete-modal" id="modalDeleteBtn" onclick="deleteFromModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
        Xóa file này
      </button>
    </div>
  </div>
</div>

<style>
/* ── Upload Zone ── */
.upload-zone-wrap{margin-bottom:1.5rem;}
.upload-zone{border:2px dashed #d1d5db;border-radius:12px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:.75rem;background:#fafafa;transition:border-color .2s,background .2s;cursor:pointer;}
.upload-zone.dragover{border-color:#1a7f5a;background:#f0fdf4;}
.upload-zone__icon{color:#9ca3af;transition:color .2s;}
.upload-zone.dragover .upload-zone__icon{color:#1a7f5a;}
.upload-zone__text{font-weight:600;font-size:1rem;color:#374151;}
.upload-zone__sub{font-size:.8rem;color:#9ca3af;}
.upload-zone__btn{padding:.5rem 1.25rem;background:#1a7f5a;color:#fff;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;transition:background .15s;}
.upload-zone__btn:hover{background:#15694a;}

/* ── Upload Queue ── */
.uq-item{display:flex;align-items:center;gap:.85rem;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.75rem 1rem;transition:border-color .2s;}
.uq-item.done{border-color:#bbf7d0;}
.uq-item.error{border-color:#fca5a5;background:#fff5f5;}
.uq-thumb{width:44px;height:44px;border-radius:7px;object-fit:cover;background:#f3f4f6;flex-shrink:0;}
.uq-thumb-video{width:44px;height:44px;border-radius:7px;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.uq-info{flex:1;min-width:0;}
.uq-name{font-size:.83rem;font-weight:500;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.uq-status{font-size:.75rem;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:.4rem;}
.uq-bar-wrap{height:5px;background:#e5e7eb;border-radius:99px;margin-top:.4rem;overflow:hidden;}
.uq-bar{height:100%;background:#1a7f5a;border-radius:99px;transition:width .3s ease;width:0%;}
.uq-bar.error{background:#dc2626;}
.uq-timer{font-size:.72rem;font-weight:600;color:#1a7f5a;min-width:40px;text-align:right;}
.uq-done-icon{color:#16a34a;flex-shrink:0;}
.uq-err-icon{color:#dc2626;flex-shrink:0;}

/* ── Stats ── */
.uploads-stats{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.ustat-card{display:flex;align-items:center;gap:.85rem;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.9rem 1.25rem;min-width:160px;flex:1;}
.ustat-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ustat-icon--blue{background:#eff6ff;color:#3b82f6;}
.ustat-icon--green{background:#f0fdf4;color:#22c55e;}
.ustat-icon--orange{background:#fff7ed;color:#f97316;}
.ustat-icon--teal{background:#f0fdfa;color:#0d9488;}
.ustat-icon--red{background:#fef2f2;color:#dc2626;}

/* ── Usage badge trên card ── */
.ucard__usage-badge{position:absolute;bottom:38px;right:6px;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;pointer-events:none;letter-spacing:.02em;}
.ucard__usage-badge--used{background:rgba(220,252,231,.92);color:#15803d;border:1px solid rgba(21,128,61,.2);}
.ucard__usage-badge--unused{background:rgba(254,226,226,.92);color:#dc2626;border:1px solid rgba(220,38,38,.2);}

/* ── Card viền màu theo trạng thái ── */
.ucard--unused{border-color:#fca5a5;}
.ucard--unused:hover{border-color:#dc2626;box-shadow:0 2px 8px rgba(220,38,38,.15);}
.ucard--used{border-color:#e5e7eb;}
.ucard--used:hover{border-color:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,.15);}
.ustat-num{font-size:1.35rem;font-weight:700;color:#111827;line-height:1.2;}
.ustat-label{font-size:.78rem;color:#6b7280;margin-top:1px;}

/* ── Toolbar ── */
.uploads-toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.uploads-filters{display:flex;gap:.4rem;background:#f3f4f6;border-radius:9px;padding:3px;}
.uf-tab{border:none;background:transparent;padding:.4rem .9rem;border-radius:7px;font-size:.83rem;font-weight:500;color:#6b7280;cursor:pointer;transition:all .15s;}
.uf-tab.active{background:#fff;color:#111827;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.uploads-actions{display:flex;gap:.6rem;align-items:center;}
.btn-uaction{border:1px solid #d1d5db;background:#fff;padding:.45rem .9rem;border-radius:7px;font-size:.82rem;font-weight:500;color:#374151;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .15s;}
.btn-uaction:hover{background:#f9fafb;}
.btn-uaction--danger{border-color:#fca5a5;color:#dc2626;background:#fff5f5;}
.btn-uaction--danger:not(:disabled):hover{background:#fef2f2;}
.btn-uaction:disabled{opacity:.45;cursor:not-allowed;}

/* ── Grid ── */
.uploads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
.uploads-loading,.uploads-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;color:#9ca3af;gap:.75rem;}
.uploads-loading svg,.uploads-empty svg{opacity:.4;}
.uploads-loading p,.uploads-empty p{font-size:.9rem;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Card ── */
.ucard{position:relative;border-radius:10px;overflow:hidden;border:2px solid #e5e7eb;background:#fff;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.ucard:hover{border-color:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,.15);}
.ucard.selected{border-color:#3b82f6;background:#eff6ff;}
.ucard__thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f3f4f6;}
.ucard__check{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:5px;border:2px solid #fff;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ucard.selected .ucard__check{background:#3b82f6;border-color:#3b82f6;}
.ucard__check svg{display:none;color:#fff;}
.ucard.selected .ucard__check svg{display:block;}
.ucard__folder{position:absolute;top:6px;right:6px;font-size:.65rem;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.55);color:#fff;}
.ucard__info{padding:.5rem .65rem .6rem;}
.ucard__name{font-size:.72rem;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.ucard__size{font-size:.68rem;color:#9ca3af;margin-top:1px;}
.ucard__del{position:absolute;bottom:6px;right:6px;width:26px;height:26px;border-radius:6px;background:rgba(220,38,38,.85);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;}
.ucard:hover .ucard__del{opacity:1;}
.ucard__del svg{color:#fff;}

/* ── Modal ── */
.umodal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:none;align-items:center;justify-content:center;padding:1rem;}
.umodal-overlay.open{display:flex;}
.umodal{background:#fff;border-radius:14px;overflow:hidden;max-width:600px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.umodal img{width:100%;max-height:400px;object-fit:contain;background:#f3f4f6;display:block;}
.umodal-close{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1;}
.umodal-info{padding:1rem 1.25rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.umodal-name{font-weight:600;font-size:.9rem;color:#111827;word-break:break-all;}
.umodal-meta{font-size:.8rem;color:#6b7280;margin-top:3px;}
.btn-udelete-modal{background:#dc2626;color:#fff;border:none;padding:.45rem 1rem;border-radius:7px;font-size:.82rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.4rem;white-space:nowrap;}
.btn-udelete-modal:hover{background:#b91c1c;}
</style>

<script>
let allFiles = [];
let currentFolder = 'all';
let selectedFiles = new Set();
let modalCurrentFile = null;
let usedUrls = new Set(); // Set các URL đang được sử dụng trong hệ thống

// ── Helper: lấy filtered list theo currentFolder ──────────────────────────────
function getFiltered() {
  if (currentFolder === 'all')      return allFiles;
  if (currentFolder === '__video')  return allFiles.filter(f => f.isVideo);
  if (currentFolder === '__image')  return allFiles.filter(f => !f.isVideo && !f.isSoftware);
  if (currentFolder === '__used')   return allFiles.filter(f => usedUrls.has(f.url));
  if (currentFolder === '__unused') return allFiles.filter(f => !usedUrls.has(f.url));
  if (currentFolder === 'software') return allFiles.filter(f => f.isSoftware);
  return allFiles.filter(f => f.folder === currentFolder);
}

// ── Load dữ liệu song song: danh sách file + URL đang dùng ───────────────────
async function loadFiles() {
  try {
    const [filesRes, usedRes] = await Promise.all([
      fetch('/admin/uploads/list'),
      fetch('/admin/uploads/used-urls')
    ]);
    const [filesData, usedData] = await Promise.all([filesRes.json(), usedRes.json()]);
    if (!filesData.ok) throw new Error(filesData.message);

    // Xây dựng set URL đang dùng
    if (usedData.ok) usedUrls = new Set(usedData.usedUrls);

    const VIDEO_EXT = ['.mp4', '.webm', '.ogg', '.mov'];
    allFiles = filesData.files.map(f => ({
      ...f,
      isVideo: VIDEO_EXT.includes(f.name.slice(f.name.lastIndexOf('.')).toLowerCase())
    }));

    renderStats(filesData.stats);
    renderGrid();
  } catch (e) {
    document.getElementById('uploadsGrid').innerHTML =
      '<div class="uploads-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>Lỗi tải dữ liệu: ' + e.message + '</p></div>';
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(stats) {
  document.getElementById('totalFiles').textContent = stats.totalFiles.toLocaleString();
  document.getElementById('totalSize').textContent = formatSize(stats.totalSize);
  renderUsageStats();
}

function renderUsageStats() {
  const usedCount   = allFiles.filter(f => usedUrls.has(f.url)).length;
  const unusedCount = allFiles.filter(f => !usedUrls.has(f.url)).length;
  document.getElementById('usedCount').textContent   = usedCount.toLocaleString();
  document.getElementById('unusedCount').textContent = unusedCount.toLocaleString();
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function renderGrid() {
  selectedFiles.clear();
  updateSelection();
  const filtered = getFiltered();
  const grid = document.getElementById('uploadsGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="uploads-empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg><p>Không có file nào</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(f => {
    const isUsed = usedUrls.has(f.url);
    const thumb = f.isSoftware
      ? `<div class="ucard__thumb" style="background:#f0f6ff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;">
           <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1860a5" stroke-width="1.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13,2 13,9 20,9"/></svg>
           <span style="font-size:.65rem;font-weight:700;color:#1860a5;">${(f.name.split('.').pop()||'FILE').toUpperCase()}</span>
         </div>`
      : f.isVideo
        ? `<video class="ucard__thumb" src="${f.url}" preload="metadata" muted style="object-fit:cover;background:#111;"></video>
           <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.55);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;pointer-events:none;"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg></div>`
        : `<img class="ucard__thumb" src="${f.url}" alt="${f.name}" loading="lazy" onerror="this.style.background='#e5e7eb'">`;
    return `
    <div class="ucard ${isUsed ? 'ucard--used' : 'ucard--unused'}" id="card-${f.id}" onclick="selectCard(event, '${f.id}')">
      ${thumb}
      <div class="ucard__check"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg></div>
      <div class="ucard__folder">${f.folder}</div>
      <div class="ucard__usage-badge ${isUsed ? 'ucard__usage-badge--used' : 'ucard__usage-badge--unused'}">
        ${isUsed
          ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg> Đang dùng`
          : `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Không dùng`
        }
      </div>
      <div class="ucard__info">
        <div class="ucard__name" title="${f.name}">${f.name}</div>
        <div class="ucard__size">${formatSize(f.size)}</div>
      </div>
      <button class="ucard__del" onclick="deleteSingle(event, '${f.id}', '${f.folder}', '${f.name}')" title="Xóa">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
      </button>
    </div>`;
  }).join('');
}

// ── Select ────────────────────────────────────────────────────────────────────
function selectCard(e, id) {
  if (e.target.closest('.ucard__del')) return;
  if (e.target.closest('.ucard__check') || e.shiftKey || e.ctrlKey || e.metaKey) {
    toggleSelect(id); return;
  }
  const f = allFiles.find(x => x.id === id);
  if (f) openModal(f);
}

function toggleSelect(id) {
  if (selectedFiles.has(id)) selectedFiles.delete(id);
  else selectedFiles.add(id);
  document.getElementById('card-' + id)?.classList.toggle('selected', selectedFiles.has(id));
  updateSelection();
}

function toggleSelectAll() {
  const filtered = getFiltered();
  if (selectedFiles.size === filtered.length) {
    selectedFiles.clear();
    filtered.forEach(f => document.getElementById('card-' + f.id)?.classList.remove('selected'));
  } else {
    filtered.forEach(f => { selectedFiles.add(f.id); document.getElementById('card-' + f.id)?.classList.add('selected'); });
  }
  updateSelection();
}

function updateSelection() {
  const n = selectedFiles.size;
  document.getElementById('selectedCount').textContent = n;
  document.getElementById('bulkCount').textContent = n;
  document.getElementById('btnBulkDelete').disabled = n === 0;
  const filtered = getFiltered();
  document.getElementById('btnSelectAll').textContent =
    selectedFiles.size === filtered.length && filtered.length > 0 ? 'Bỏ chọn tất cả' : 'Chọn tất cả';
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteSingle(e, id, folder, name) {
  e.stopPropagation();
  // Cảnh báo thêm nếu file đang được dùng
  const file = allFiles.find(f => f.id === id);
  const isUsed = file && usedUrls.has(file.url);
  const msg = isUsed
    ? `⚠️ File "${name}" đang được sử dụng trên website!\nXóa có thể gây lỗi hiển thị. Vẫn xóa?`
    : `Xóa file "${name}"?`;
  if (!confirm(msg)) return;
  const res = await fetch('/admin/uploads/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: [{ id, folder, url: file?.url }] })
  });
  const data = await res.json();
  if (data.ok) {
    allFiles = allFiles.filter(f => f.id !== id);
    document.getElementById('card-' + id)?.remove();
    selectedFiles.delete(id);
    updateStats(); updateSelection();
  } else alert('Lỗi: ' + data.message);
}

async function bulkDelete() {
  if (!selectedFiles.size) return;
  const toDelete = allFiles.filter(f => selectedFiles.has(f.id));
  const usedInSelection = toDelete.filter(f => usedUrls.has(f.url));
  let msg = `Xóa ${selectedFiles.size} file đã chọn?`;
  if (usedInSelection.length > 0)
    msg = `⚠️ ${usedInSelection.length} trong số ${selectedFiles.size} file đang được dùng trên website!\nXóa có thể gây lỗi hiển thị. Vẫn xóa tất cả?`;
  if (!confirm(msg)) return;
  const res = await fetch('/admin/uploads/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: toDelete.map(f => ({ id: f.id, folder: f.folder, url: f.url })) })
  });
  const data = await res.json();
  if (data.ok) {
    allFiles = allFiles.filter(f => !selectedFiles.has(f.id));
    selectedFiles.forEach(id => document.getElementById('card-' + id)?.remove());
    selectedFiles.clear();
    updateStats(); updateSelection();
  } else alert('Lỗi: ' + data.message);
}

function updateStats() {
  document.getElementById('totalFiles').textContent = allFiles.length.toLocaleString();
  document.getElementById('totalSize').textContent = formatSize(allFiles.reduce((s, f) => s + f.size, 0));
  renderUsageStats();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(f) {
  modalCurrentFile = f;
  const img = document.getElementById('modalImg');
  const vid = document.getElementById('modalVideo');
  if (f.isVideo) {
    img.style.display = 'none'; img.src = '';
    vid.style.display = ''; vid.src = f.url;
  } else {
    vid.style.display = 'none'; vid.src = '';
    img.style.display = ''; img.src = f.url;
  }
  const isUsed = usedUrls.has(f.url);
  document.getElementById('modalName').textContent = f.name;
  document.getElementById('modalMeta').textContent = `${f.folder} • ${formatSize(f.size)}`;
  // Hiện badge trạng thái trong modal
  let badge = document.getElementById('modalUsageBadge');
  if (!badge) {
    badge = document.createElement('span');
    badge.id = 'modalUsageBadge';
    badge.style.cssText = 'font-size:.75rem;font-weight:600;padding:2px 8px;border-radius:999px;margin-left:.5rem;vertical-align:middle;';
    document.getElementById('modalName').appendChild(badge);
  }
  badge.textContent   = isUsed ? '✓ Đang dùng' : 'Không dùng';
  badge.style.background = isUsed ? '#dcfce7' : '#fee2e2';
  badge.style.color      = isUsed ? '#15803d' : '#dc2626';

  const delBtn = document.getElementById('modalDeleteBtn');
  if (isUsed) {
    delBtn.title = 'File này đang được dùng trên website';
    delBtn.style.opacity = '0.7';
  } else {
    delBtn.title = '';
    delBtn.style.opacity = '1';
  }
  document.getElementById('imgModal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('imgModal')) {
    document.getElementById('imgModal').classList.remove('open');
    const vid = document.getElementById('modalVideo');
    vid.pause(); vid.src = '';
  }
}

async function deleteFromModal() {
  if (!modalCurrentFile) return;
  const f = modalCurrentFile;
  const isUsed = usedUrls.has(f.url);
  const msg = isUsed
    ? `⚠️ File "${f.name}" đang được sử dụng trên website!\nXóa có thể gây lỗi hiển thị. Vẫn xóa?`
    : `Xóa file "${f.name}"?`;
  if (!confirm(msg)) return;
  const res = await fetch('/admin/uploads/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: [{ id: f.id, folder: f.folder, url: f.url }] })
  });
  const data = await res.json();
  if (data.ok) {
    allFiles = allFiles.filter(x => x.id !== f.id);
    document.getElementById('card-' + f.id)?.remove();
    updateStats(); updateSelection();
    document.getElementById('imgModal').classList.remove('open');
  } else alert('Lỗi: ' + data.message);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}

// ── Tab filter ────────────────────────────────────────────────────────────────
document.querySelectorAll('.uf-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.uf-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if      (btn.dataset.type  === 'video')  currentFolder = '__video';
    else if (btn.dataset.type  === 'image')  currentFolder = '__image';
    else if (btn.dataset.usage === 'used')   currentFolder = '__used';
    else if (btn.dataset.usage === 'unused') currentFolder = '__unused';
    else currentFolder = btn.dataset.folder;
    renderGrid();
  });
});

const zone = document.getElementById('uploadZone');

zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  handleFileSelect(e.dataTransfer.files);
});
zone.addEventListener('click', e => {
  if (!e.target.closest('label')) document.getElementById('uploadFileInput').click();
});

function handleFileSelect(files) {
  const queue = document.getElementById('uploadQueue');
  queue.style.display = 'flex';
  Array.from(files).forEach(file => uploadFile(file));
}

async function uploadFile(file) {
  const queue = document.getElementById('uploadQueue');
  const isVideo = /\.(mp4|webm|ogg|mov)$/i.test(file.name);
  const isImage = /\.(jpe?g|png|webp|gif)$/i.test(file.name);
  if (!isVideo && !isImage) {
    showQueueError(file.name, 'Định dạng không được hỗ trợ');
    return;
  }

  // Tạo item trong queue
  const id = 'uq-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const item = document.createElement('div');
  item.className = 'uq-item';
  item.id = id;

  // Thumbnail preview
  let thumbHTML = '';
  if (isImage) {
    const previewUrl = URL.createObjectURL(file);
    thumbHTML = `<img class="uq-thumb" src="${previewUrl}" alt="" />`;
  } else {
    thumbHTML = `<div class="uq-thumb-video"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg></div>`;
  }

  item.innerHTML = `
    ${thumbHTML}
    <div class="uq-info">
      <div class="uq-name">${file.name}</div>
      <div class="uq-status">
        <span class="uq-status-text">⏳ Đang chuẩn bị...</span>
      </div>
      <div class="uq-bar-wrap"><div class="uq-bar" id="bar-${id}"></div></div>
    </div>
    <div class="uq-timer" id="timer-${id}">—</div>
  `;
  queue.prepend(item);

  // Upload với XMLHttpRequest để theo dõi tiến trình
  const formData = new FormData();
  formData.append('file', file);
  const url = isVideo ? '/admin/upload-video' : '/admin/upload-image';

  const startTime = Date.now();
  let timerInterval = null;

  const xhr = new XMLHttpRequest();
  xhr.open('POST', url);
  xhr.withCredentials = true;

  xhr.upload.addEventListener('progress', e => {
    if (!e.lengthComputable) return;
    const pct = Math.round((e.loaded / e.total) * 100);
    const bar = document.getElementById('bar-' + id);
    const timerEl = document.getElementById('timer-' + id);
    const statusEl = item.querySelector('.uq-status-text');

    if (bar) bar.style.width = pct + '%';

    // Ước tính thời gian còn lại
    const elapsed = (Date.now() - startTime) / 1000;
    const speed = e.loaded / elapsed; // bytes/s
    const remaining = speed > 0 ? Math.ceil((e.total - e.loaded) / speed) : null;

    if (statusEl) statusEl.textContent = `⬆ Đang tải lên... ${pct}%`;
    if (timerEl) timerEl.textContent = remaining !== null && remaining > 0 ? remaining + 's' : '';
  });

  xhr.addEventListener('load', () => {
    clearInterval(timerInterval);
    const timerEl = document.getElementById('timer-' + id);
    const bar = document.getElementById('bar-' + id);
    const statusEl = item.querySelector('.uq-status-text');
    try {
      const data = JSON.parse(xhr.responseText);
      if (data.location) {
        if (bar) bar.style.width = '100%';
        if (timerEl) timerEl.innerHTML = '<svg class="uq-done-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>';
        if (statusEl) statusEl.textContent = '✓ Tải lên thành công';
        item.classList.add('done');
        // Thêm vào đầu danh sách file
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        const sizeKb = (file.size / 1024).toFixed(0);
        const folder = 'content';
        allFiles.unshift({
          id: data.location.split('/').slice(-2).join('/'),
          folder,
          name: file.name,
          url: data.location,
          size: file.size,
          mtime: Date.now(),
          isVideo
        });
        renderGrid();
        renderStats({ totalFiles: allFiles.length, totalSize: allFiles.reduce((s,f) => s + f.size, 0) });
      } else {
        throw new Error(data.error || 'Lỗi không xác định');
      }
    } catch(e) {
      if (bar) { bar.style.width = '100%'; bar.classList.add('error'); }
      if (timerEl) timerEl.innerHTML = '<svg class="uq-err-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      if (statusEl) statusEl.textContent = '✗ Lỗi: ' + e.message;
      item.classList.add('error');
    }
  });

  xhr.addEventListener('error', () => {
    clearInterval(timerInterval);
    const bar = document.getElementById('bar-' + id);
    const statusEl = item.querySelector('.uq-status-text');
    if (bar) { bar.style.width = '100%'; bar.classList.add('error'); }
    if (statusEl) statusEl.textContent = '✗ Lỗi kết nối mạng';
    item.classList.add('error');
  });

  xhr.send(formData);
}

function showQueueError(name, msg) {
  const queue = document.getElementById('uploadQueue');
  queue.style.display = 'flex';
  const item = document.createElement('div');
  item.className = 'uq-item error';
  item.innerHTML = `
    <div class="uq-thumb-video" style="background:#fee2e2;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <div class="uq-info">
      <div class="uq-name">${name}</div>
      <div class="uq-status"><span class="uq-status-text">✗ ${msg}</span></div>
    </div>`;
  queue.prepend(item);
}
